<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <label for="margin">Sales Margin</label>
    <input type="number" id="margin" name="margin" required/>
    
    <form class="inputData">  
        <div id="itemsContainer">
            <div class="costinput">
                <label>Item Name</label>
                <input type="text" class="itemName" name="itemName"/>

                <label>Part Number</label>
                <input type="text" class="ptNum" name="ptNum" required/>

                <label>Cost</label>
                <input type="number" class="itemCost" name="itemCost" required value="0"/>

                <button type="button" class="removeBtn">Delete Item</button>
            </div>
        </div>    
    

        <div class="itemAdd">
            <input type="button" id="addBtn" name="addBtn" value="Add Item">
        </div>
    </form>

    <h2>Total Cost: <span id="totCost"></span></h2>
    <h2>Total Sale: <span id="totSale"></span></h2>

    <form class="submit">
        <input type="button" id="submitBtn" name="submitBtn" value="Submit">
    </form>
</body>
</html>
